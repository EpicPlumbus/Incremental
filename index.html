<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Incremental Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Coin Clicker</h1>
        
        <div class="score-board">
            <p>Coins: <span id="coin-count">0</span></p>
            <p>Coins per second: <span id="cps-count">0</span></p>
        </div>

        <button id="click-btn" class="main-button">Click Me!</button>

        <div class="upgrades">
            <h2>Upgrades</h2>
            <button id="buy-autoclicker-btn">
                Buy Auto-Clicker (Cost: <span id="autoclicker-cost">10</span>)
            </button>
            <p>Owned: <span id="autoclicker-count">0</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
